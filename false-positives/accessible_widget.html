<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Accessible Widget (no crypto)</title>
  <style>.falcon{}.serpent{}.camellia{}.salsa{}.tiger{}</style>
</head>
<body>
  <nav aria-label="Primary">
    <button aria-label="Share" class="falcon">Share</button>
    <button aria-label="Broadcast" class="serpent">Broadcast</button>
  </nav>
  <section aria-describedby="tea" class="camellia">
    <!-- aria-* attributes literally contain "ARIA"; rc4 below = release candidate -->
    <p>Version 2.0.0-rc4 -- Simon, Frodo and Rainbow tested it over tea.</p>
  </section>
</body>
</html>
